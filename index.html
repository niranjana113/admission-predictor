<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admission Predictor</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>Admission Predictor</h1>
      <p>Enter student details to estimate admission probability and get recommended universities.</p>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Student Details</h2>

        <label>CGPA
          <input id="cgpa" type="number" step="0.01" value="8.5" />
        </label>

        <label>GRE
          <input id="gre" type="number" value="320" />
        </label>

        <label>TOEFL
          <input id="toefl" type="number" value="110" />
        </label>

        <label>Research
          <select id="research">
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </label>

        <button id="predict">Predict Admission</button>
      </section>

      <section class="card">
        <h2>Results</h2>
        <div id="prob" class="big">--%</div>
        <ul id="recs"></ul>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
